<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Educa+ | Alfabetização Divertida</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main id="jogo-container">
        <header>
            <h1>Educa+</h1>
            <p>Junte as sílabas para formar a palavra!</p>
        </header>

        <section id="area-dica">
            <div id="imagem-palavra">
                <span>💡</span> 
            </div>
        </section>

        <section id="area-construcao">
            <div id="palavra-montada">
                </div>
        </section>

        <section id="area-opcoes">
            <div id="banco-silabas">
                </div>
        </section>

        <section id="feedback" class="oculto">
            <p id="mensagem-texto"></p>
            <button onclick="proximaFase()">Próxima Palavra</button>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
